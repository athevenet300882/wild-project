<!--Deux femmes se promènent et, soudainement, elles ont envie de faire pipi. N'ayant pas de toilettes à proximité, elles décident d'aller se soulager derrière une tombe.
N'ayant rien pour s'essuyer, l'une prend sa culotte, s'essuie et la jette. L'autre prend un ruban d'une couronne florale, s'essuie et le jette.
Le lendemain, les maris des deux femmes se rencontrent et l'un dit à l'autre :
Je ne sais pas quoi penser... ma femme est rentrée sans culotte.
Et l'autre dit : - Moi, c'est encore pire : j'ai trouvé une carte entre ses fesses qui disait :
« De la part de tous les gars de la caserne de Paris, nous ne t'oublierons jamais. »-->
